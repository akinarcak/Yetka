version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Istanbul
    target-branch: dev
    open-pull-requests-limit: 10
    groups:
      python-security-and-maintenance:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/Istanbul
    target-branch: dev
    groups:
      actions-maintenance:
        patterns: ["*"]
