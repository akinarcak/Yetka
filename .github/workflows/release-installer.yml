name: Publish Yetka installer

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts
        run: find deploy -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Build installer archive
        run: |
          archive="yetka-installer-${GITHUB_REF_NAME}.tar.gz"
          tar --create --gzip --file "$archive" deploy
          sha256sum "$archive" > "$archive.sha256"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"
      - name: Attach installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "Yetka $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" "$ARCHIVE.sha256" --clobber
