name: Validate deployment scripts

on:
  pull_request:
    paths: ['deploy/**', '.github/workflows/deploy-scripts.yml']
  push:
    paths: ['deploy/**', '.github/workflows/deploy-scripts.yml']

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax
        run: find deploy -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./deploy
          severity: warning
      - name: Initial password documentation contract
        run: |
          grep -F 'password=make_password("ChangeMe")' apps/users/migrations/0001_initial.py
          grep -F -- "- Parola: \`ChangeMe\`" README.md
